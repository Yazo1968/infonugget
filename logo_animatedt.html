<div class="logo-chisel" style="position:relative;width:640px;height:360px;overflow:hidden;margin:0 auto;">
  <canvas class="logo-chisel-debris" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;"></canvas>

  <!-- Conveyor line -->
  <div style="position:absolute;bottom:108px;left:0;right:0;height:1px;z-index:1;">
    <svg width="100%" height="1" style="display:block;">
      <line x1="0" y1="0.5" x2="100%" y2="0.5" stroke="#d0d0d0" stroke-width="0.75"/>
    </svg>
  </div>

  <!-- Current nugget -->
  <div class="logo-chisel-wrapper current" style="position:absolute;top:0;left:0;width:100%;height:100%;">
    <div class="logo-chisel-shadow" style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:180px;height:14px;background:radial-gradient(ellipse,rgba(0,0,0,0.18) 0%,transparent 70%);border-radius:50%;z-index:0;"></div>
    <svg class="logo-chisel-svg" viewBox="-250 -150 1780 1020" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;">
      <defs>
        <linearGradient id="shimmer-current" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(180,200,230,0)"/>
          <stop offset="45%" stop-color="rgba(180,200,230,0)"/>
          <stop offset="50%" stop-color="rgba(180,200,230,0.8)"/>
          <stop offset="55%" stop-color="rgba(180,200,230,0)"/>
          <stop offset="100%" stop-color="rgba(180,200,230,0)"/>
          <animate attributeName="x1" from="-1" to="1" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="x2" from="0" to="2" dur="2.5s" repeatCount="indefinite"/>
        </linearGradient>
        <clipPath id="blue-clip-current"><path class="logo-chisel-blue-clip" d=""/></clipPath>
      </defs>
      <path class="logo-chisel-dark" fill="#262626" fill-rule="evenodd" d=""/>
      <g class="logo-chisel-cracks" opacity="0"></g>
      <path class="logo-chisel-blue" fill="#78AAE6" fill-rule="evenodd" d="" opacity="0"/>
      <rect class="logo-chisel-shimmer" x="0" y="0" width="1280" height="720" fill="url(#shimmer-current)" clip-path="url(#blue-clip-current)" opacity="0"/>
    </svg>
  </div>

  <!-- Incoming nugget -->
  <div class="logo-chisel-wrapper incoming" style="position:absolute;top:0;left:0;width:100%;height:100%;transform:translateX(-110%);">
    <div class="logo-chisel-shadow" style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:180px;height:14px;background:radial-gradient(ellipse,rgba(0,0,0,0.18) 0%,transparent 70%);border-radius:50%;z-index:0;"></div>
    <svg class="logo-chisel-svg" viewBox="-250 -150 1780 1020" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;">
      <defs>
        <linearGradient id="shimmer-incoming" x1="0" y1="0" x2="1" y2="0.3">
          <stop offset="0%" stop-color="rgba(180,200,230,0)"/>
          <stop offset="45%" stop-color="rgba(180,200,230,0)"/>
          <stop offset="50%" stop-color="rgba(180,200,230,0.8)"/>
          <stop offset="55%" stop-color="rgba(180,200,230,0)"/>
          <stop offset="100%" stop-color="rgba(180,200,230,0)"/>
          <animate attributeName="x1" from="-1" to="1" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="x2" from="0" to="2" dur="2.5s" repeatCount="indefinite"/>
        </linearGradient>
        <clipPath id="blue-clip-incoming"><path class="logo-chisel-blue-clip" d=""/></clipPath>
      </defs>
      <path class="logo-chisel-dark" fill="#262626" fill-rule="evenodd" d=""/>
      <g class="logo-chisel-cracks" opacity="0"></g>
      <path class="logo-chisel-blue" fill="#78AAE6" fill-rule="evenodd" d="" opacity="0"/>
      <rect class="logo-chisel-shimmer" x="0" y="0" width="1280" height="720" fill="url(#shimmer-incoming)" clip-path="url(#blue-clip-incoming)" opacity="0"/>
    </svg>
  </div>
</div>

<script>
(function(){
  const root = document.querySelector('.logo-chisel');
  const canvas = root.querySelector('.logo-chisel-debris');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animId = null;

  const currentWrap = root.querySelector('.logo-chisel-wrapper.current');
  const incomingWrap = root.querySelector('.logo-chisel-wrapper.incoming');

  const frames = [
    { dark:"M574.726 171 669.634 180.205 761.138 223.429 816 327.888 815.6 394.325 774.753 479.173 622.981 528 525.67 496.783 511.254 471.168 478.016 440.751 464 379.117 498.239 240.639Z", blue:null, blueOpacity:0 },
    { dark:"M574.726 171 669.634 180.205 761.138 223.429 816 327.888 815.6 394.325 774.753 479.173 622.981 528 525.67 496.783 511.254 471.168 478.016 440.751 464 379.117 498.239 240.639Z", blue:"M693 208 665.774 294.943 645.945 326.156 625.736 343.749 565.667 399.04 576.89 375.505 534.049 411 482 382.285 524.841 285.77 542.858 278.99 541.256 318.473 571.685 254.263 601.313 228.739 638.548 228.34Z", blueOpacity:1 },
    { dark:"M693.388 192 695.102 192.808 696.264 192.385 761.138 223.948 816 328.229 816 328.229 816 328.229 815.6 394.553 774.753 479.256 622.981 528 525.67 496.836 511.254 471.265 478.016 440.9 464 379.37 464 379.37 464 379.37 464 379.37 464.036 379.226 464.065 379.223 473.602 357.793 501.509 250.318 542.556 239.331 597.619 199.044Z", blue:"M693 208 665.774 294.943 645.945 326.156 625.736 343.749 565.667 399.04 576.89 375.505 534.049 411 482 382.285 524.841 285.77 542.858 278.99 541.256 318.473 571.685 254.263 601.313 228.739 638.548 228.34Z", blueOpacity:1 },
    { dark:"M693.388 192 695.102 192.808 696.264 192.385 761.138 223.948 816 328.229 816 328.229 816 328.229 815.6 394.553 774.753 479.256 622.981 528 525.67 496.836 511.254 471.265 478.016 440.9 464 379.37 464 379.37 464 379.37 464 379.37 464.036 379.226 464.065 379.223 473.602 357.793 501.509 250.318 542.556 239.331 597.619 199.044Z", blue:"M693.207 208 665.955 294.992 633.492 346.07 677.577 308.958 730 290.879 695.011 366.687 665.955 350.725 637.567 379.324 643.244 415.57 622.204 391.295 582.21 440 554.139 423.484 576.983 375.599 534.1 411.114 482 382.383 524.883 285.814 542.917 279.03 541.314 318.535 571.773 254.289 601.43 228.75 638.702 228.351Z", blueOpacity:1 },
    { dark:"M590.143 215.2 629.388 216.4 696.264 192 761.138 223.6 816 328 815.6 394.4 774.753 479.2 622.981 528 525.67 496.8 511.254 471.2 478.016 440.8 464 379.2 510.052 275.6 541.688 264Z", blue:"M601.437 228.786 638.71 228.386 693.218 208 665.964 295.139 633.5 346.304 677.587 309.13 749.329 284.347 785 319.123 744.921 299.136 714.861 389.474 751.734 427.047 705.643 400.266 608.25 444.635 614.663 495 589.413 444.635 554.143 423.85 576.988 375.883 534.103 411.458 482 382.678 524.885 285.946 542.921 279.15 541.317 318.723 571.778 254.368Z", blueOpacity:1 }
  ];

  const crackSets = [
    [{d:"M570 280 L545 310 L530 350",stroke:"#444"},{d:"M560 290 L580 330 L565 360",stroke:"#3a3a3a"},{d:"M540 320 L520 355",stroke:"#444"}],
    [{d:"M575 175 L550 210 L500 245",stroke:"#444"},{d:"M560 190 L530 230 L505 260",stroke:"#3a3a3a"},{d:"M498 241 L475 290 L465 340",stroke:"#444"},{d:"M520 220 L490 270",stroke:"#3a3a3a"}],
    [{d:"M660 300 L690 320 L710 290",stroke:"#444"},{d:"M640 350 L665 370 L680 340",stroke:"#3a3a3a"},{d:"M620 380 L650 400",stroke:"#444"}],
    [{d:"M700 195 L680 220 L650 215",stroke:"#444"},{d:"M590 200 L570 230 L545 255",stroke:"#3a3a3a"},{d:"M510 260 L500 280 L505 275",stroke:"#444"},{d:"M695 200 L720 240 L740 280",stroke:"#3a3a3a"}]
  ];

  function resizeCanvas(){
    canvas.width = root.offsetWidth;
    canvas.height = root.offsetHeight;
  }

  function spawnDebris(count, ox, oy){
    for(let i=0;i<count;i++){
      const angle=(Math.random()-0.5)*Math.PI*1.2-Math.PI/2;
      const speed=2+Math.random()*6;
      const size=2+Math.random()*5;
      particles.push({x:ox+(Math.random()-0.5)*60,y:oy+(Math.random()-0.5)*40,vx:Math.cos(angle)*speed*(Math.random()>0.5?1:-1),vy:Math.sin(angle)*speed-2,size,life:1,decay:0.015+Math.random()*0.025,color:Math.random()>0.3?'#262626':'#555',rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.3});
    }
  }

  function updateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.vx*=0.98;p.life-=p.decay;p.rotation+=p.rotSpeed;
      if(p.life<=0){particles.splice(i,1);continue;}
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation);ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.moveTo(-p.size,-p.size*0.4);ctx.lineTo(p.size*0.3,-p.size*0.8);ctx.lineTo(p.size,p.size*0.2);ctx.lineTo(-p.size*0.2,p.size*0.6);ctx.closePath();ctx.fill();ctx.restore();
    }
  }

  function particleLoop(){updateParticles();if(particles.length>0)animId=requestAnimationFrame(particleLoop);else animId=null;}

  function impact(intensity){
    const sf=[];
    for(let i=0;i<3;i++) sf.push({transform:`translate(${(Math.random()-0.5)*3.5*intensity}px,${(Math.random()-0.5)*2.5*intensity}px)`});
    sf.push({transform:'translate(0,0)'});
    root.animate(sf,{duration:200,easing:'ease-out'});
    spawnDebris(Math.floor(12*intensity),canvas.width*0.48,canvas.height*0.45);
    if(!animId) particleLoop();
  }

  function setFrame(wrap, i){
    const f=frames[i];
    wrap.querySelector('.logo-chisel-dark').setAttribute('d',f.dark);
    if(f.blue){
      wrap.querySelector('.logo-chisel-blue').setAttribute('d',f.blue);
      wrap.querySelector('.logo-chisel-blue-clip').setAttribute('d',f.blue);
    }
    wrap.querySelector('.logo-chisel-blue').setAttribute('opacity',f.blueOpacity);
  }

  function showCracks(wrap, crackIndex){
    const g=wrap.querySelector('.logo-chisel-cracks');
    const cracks=crackSets[crackIndex];
    let html='';
    cracks.forEach(c=>{html+=`<path d="${c.d}" stroke="${c.stroke}" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round"/>`;});
    g.innerHTML=html;
    g.setAttribute('opacity','1');
    g.querySelectorAll('path').forEach(p=>{
      const len=p.getTotalLength?p.getTotalLength():100;
      p.style.strokeDasharray=len;
      p.style.strokeDashoffset=len;
      p.style.transition='stroke-dashoffset 150ms ease-out';
      requestAnimationFrame(()=>{p.style.strokeDashoffset='0';});
    });
  }

  function hideCracks(wrap){
    const g=wrap.querySelector('.logo-chisel-cracks');
    g.setAttribute('opacity','0');
    g.innerHTML='';
  }

  function showShimmer(wrap){wrap.querySelector('.logo-chisel-shimmer').setAttribute('opacity','1');}
  function hideShimmer(wrap){wrap.querySelector('.logo-chisel-shimmer').setAttribute('opacity','0');}

  function resetWrap(wrap){
    wrap.querySelector('.logo-chisel-dark').setAttribute('d','');
    wrap.querySelector('.logo-chisel-blue').setAttribute('d','');
    wrap.querySelector('.logo-chisel-blue').setAttribute('opacity',0);
    wrap.querySelector('.logo-chisel-blue-clip').setAttribute('d','');
    hideCracks(wrap);
    hideShimmer(wrap);
  }

  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

  const slideDur=900;
  const slideEase='cubic-bezier(0.4, 0, 0.2, 1)';

  async function slideTransition(finishedWrap, freshWrap){
    particles=[];
    ctx.clearRect(0,0,canvas.width,canvas.height);
    resetWrap(freshWrap);
    setFrame(freshWrap,0);
    freshWrap.style.transition='none';
    freshWrap.style.transform='translateX(-110%)';
    await sleep(50);
    finishedWrap.style.transition=`transform ${slideDur}ms ${slideEase}`;
    freshWrap.style.transition=`transform ${slideDur}ms ${slideEase}`;
    finishedWrap.style.transform='translateX(110%)';
    freshWrap.style.transform='translateX(0%)';
    await sleep(slideDur+50);
    finishedWrap.style.transition='none';
    finishedWrap.style.transform='translateX(-110%)';
    resetWrap(finishedWrap);
  }

  async function chisel(wrap){
    const intensities=[1,1.2,1.0,1.4];
    const delays=[700,650,700,500];
    for(let i=0;i<4;i++){
      showCracks(wrap,i);
      await sleep(200);
      setFrame(wrap,i+1);
      hideCracks(wrap);
      impact(intensities[i]);
      if(i===0) showShimmer(wrap);
      await sleep(delays[i]);
    }
    await sleep(500);
  }

  let useCurrentFirst=true;

  async function runLoop(){
    let active=useCurrentFirst?currentWrap:incomingWrap;
    let standby=useCurrentFirst?incomingWrap:currentWrap;
    await chisel(active);
    await slideTransition(active,standby);
    useCurrentFirst=!useCurrentFirst;
    runLoop();
  }

  async function start(){
    resizeCanvas();
    incomingWrap.style.transform='translateX(-110%)';
    resetWrap(currentWrap);
    setFrame(currentWrap,0);
    currentWrap.style.transition='none';
    currentWrap.style.transform='translateX(-110%)';
    await sleep(200);
    currentWrap.style.transition=`transform ${slideDur}ms ${slideEase}`;
    currentWrap.style.transform='translateX(0%)';
    await sleep(slideDur);
    impact(0.6);
    await sleep(600);
    runLoop();
  }

  window.addEventListener('resize',resizeCanvas);
  start();
})();
</script>
